spring:
  application:
    name: contract-ai
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/contractai}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

server:
  port: ${PORT:8080}

langchain4j:
  google-ai-gemini:
    chat-model:
      api-key: ${GEMINI_API_KEY}
      model-name: gemini-2.5-flash
      temperature: 0.3
    embedding-model:
      api-key: ${GEMINI_API_KEY}
      model-name: gemini-embedding-001
      output-dimensionality: 768
      task-type: RETRIEVAL_DOCUMENT

app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-256-bit-secret-key-for-production-use}
    expiration-ms: 86400000
  upload:
    dir: ${APP_UPLOAD_DIR:uploads/contracts}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.contractai: INFO
    org.springframework.security: WARN
